[tool.ruff]
# Ruff 配置：代码格式化 + 代码质量检查
line-length = 100
target-version = "py311"

[format]
# 格式化配置
quote-style = "double"
indent-style = "space"
docstring-code-format = true

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "C4",  # flake8-comprehensions
]
ignore = [
    "E501",  # 行长度由 formatter 处理
]

[lint.isort]
# import 排序
combine-as-imports = true
force-sort-within-sections = true
